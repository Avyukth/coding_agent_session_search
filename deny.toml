# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []  # Check all targets

# ==============================================================================
# ADVISORIES - Check for security vulnerabilities via RustSec
# ==============================================================================
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Ignored unmaintained transitive dependencies waiting on upstream fixes:
# - yaml-rust via syntect: https://github.com/trishume/syntect/issues/514
# - paste via ratatui: waiting on ratatui update
ignore = ["RUSTSEC-2024-0320", "RUSTSEC-2024-0436"]

# ==============================================================================
# LICENSES - Enforce allowed open source licenses
# ==============================================================================
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "BSL-1.0",               # Boost Software License
    "MPL-2.0",               # Mozilla Public License (permissive)
    "CDLA-Permissive-2.0",   # Community Data License Agreement (webpki-roots)
]
confidence-threshold = 0.9

# Handle license exceptions for specific crates
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ==============================================================================
# BANS - Deny deprecated or duplicate crates  
# ==============================================================================
[bans]
multiple-versions = "warn"   # Warn on multiple versions of same crate
wildcards = "deny"           # Deny wildcard dependencies (*)
highlight = "all"            # Highlight all duplicates
workspace-default-features = "allow"
external-default-features = "allow"

# Deprecated crates to ban
deny = [
    # Deprecated/superseded crates
    { crate = "tempdir", reason = "Use 'tempfile' instead" },
    { crate = "failure", reason = "Use 'anyhow' or 'thiserror' instead" },
    { crate = "rustc-serialize", reason = "Use 'serde' instead" },
]

# Allow specific duplicates that are common in ecosystem
skip = []

# ==============================================================================
# SOURCES - Limit where crates can be fetched from
# ==============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
